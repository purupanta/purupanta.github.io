<head>

    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />

    <title>Puru Panta Homepage</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" type="text/css" href="./css/styles.main.css">
    <link rel="stylesheet" type="text/css" href="./css/styles.table.css">
    <script type="text/javascript" src="./js/scripts.main.js"></script>
    <script type="text/javascript" src="./js/scripts.section.visibility.js"></script>

    <script>

        //$.support.cors = true;
        $(document).ready(function () {

            var page_dict = {
                default_page: { id: 'default_page', name: 'default_page', page_loc_name: './home.html#top' }, //default page is set to 'home'
                index: { id: 'index', name: 'index', page_loc_name: './index.html#top' },
                home: { id: 'home', name: 'home', page_loc_name: './home.html#top' },
                timeline: { id: 'timeline', name: 'timeline', page_loc_name: './timeline.html#top' },                
            }

            var website_fns = {
                LoadPage:
                    function (page_loc_name = null) {
                        $("#main_content").load(page_loc_name, function (responseTxt, statusTxt, xhr) {
                            if (statusTxt == "success") {
                                console.log("Page Location: " + page_loc_name);
                            }
                            if (statusTxt == "error") {
                                console.log("Error: " + xhr.status + ": " + xhr.statusText);
                            }
                        });
                    },

                clickedMenuItem:
                    function (clicked_id = null) {
                        console.log("Clicked Id: " + clicked_id + '\n');

                        for (const [key, value] of Object.entries(page_dict)) {
                           
                            if (clicked_id == value.id) {

                                console.log('key, value: ' + key + '||' + JSON.stringify(value) + '\n');

                                website_fns.LoadPage(value.page_loc_name);

                                //$("nav.nav a.nav_logo").removeClass("active");
                                //$("nav.nav a.nav_link").removeClass("active");
                                //$(clicked_id).addClass("active");

                                console.log("DONE");
                                break;
                            }
                        }
                    },

            }

            var clicked_id = 'default_page';

            //Show the default page (home) initially
            website_fns.clickedMenuItem(clicked_id);

            $('a.nav_logo, a.nav_link').click(function (e) {
                //e.preventDefault();
                this.clicked_id = $(this).attr('id');
                console.log("Clicked Id: " + this.clicked_id);

                website_fns.clickedMenuItem(this.clicked_id);

            });

        });

    </script>

</head>

<body id="body-pd">
    <header class="header" id="header">
        <div class="header_toggle"> <i class='bx bx-menu' id="header-toggle"></i> </div>
        <div class="header_img"> <img src="./img/purupanta.jpg" alt=""> </div>
    </header>
    <div class="l-navbar" id="nav-bar">
        <nav class="nav">
            <div> <!-- Added div to align the left menu at top -->
                <a href="#home" id="home" name="home" class="nav_logo active"> <i class='bx bx-home-smile nav_logo-icon'></i> <span class="nav_logo-name">Puru Homepage</span> </a>
                <div class="nav_list">
                    <a href="#timeline" id="timeline" name="timeline" class="nav_link"> <i class='bx bx-book-reader nav_icon'></i> <span class="nav_name">Timeline</span> </a>
                    <a href="#res-pub" id="res-pub" name="res-pub" class="nav_link"> <i class='bx bx-clipboard nav_icon'></i> <span class="nav_name">Research</span> </a>
                    <a href="#projects" id="projects" name="projects" class="nav_link"> <i class='bx bx-layer nav_icon'></i> <span class="nav_name">Projects</span> </a>
                    <a href="#contact" id="contact" name="contact" class="nav_link"> <i class='bx bx-calendar-check nav_icon'></i> <span class="nav_name">Contact</span> </a>

                </div>
                <a href="#" class="nav_link"> <i class='bx bx-heart-circle nav_icon'></i> <span class="nav_name">Thank you for visit!</span> </a>
            </div>
        </nav>
    </div>
    <!--Container Main start-->
    <div class="height-100 bg-light">
        THIS IS DEFAULT PAGE2
        <div id="main_content">

            THIS IS DEFAULT PAGE1
        </div>

    </div>
    <!--Container Main end-->


</body>
</html>
